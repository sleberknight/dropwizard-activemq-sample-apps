server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

serviceName: consumer-beta

activeMq:
  brokerUri: tcp://activemq:61616
  useSecureActiveMQConnections: false
  useSecureRestConnections: false
  consumers:
    - queue:all_events
    - fixedtopic:announcements
    - queue:notifications
  healthConfig:
    jmxUser: admin
    jmxCred: admin

logging:
  level: INFO
  loggers:
    org.kiwiproject: DEBUG
    org.apache.activemq: WARN
